[MeasureSettings]
Measure=Script
ScriptFile=#ROOTCONFIGPATH#@Resources\Scripts\Settings.lua
SettingsPath=#ROOTCONFIGPATH#@Resources\UserSettings.inc
BridgeSettingsPath=#ROOTCONFIGPATH#@Resources\Data\settings.ini
DataPath=#ROOTCONFIGPATH#@Resources\Data
UpdateDivider=1

[MeasureTestAlert]
Measure=Plugin
Plugin=RunCommand
Program=powershell.exe
Parameter=-NoLogo -NoProfile -NonInteractive -Sta -WindowStyle Hidden -ExecutionPolicy Bypass -File "#ROOTCONFIGPATH#@Resources\Scripts\BatteryAlert.ps1" -Battery #BatteryAlertLevel# -DeviceName "Headphones" -Kind test
State=Hide
OutputType=ANSI
DynamicVariables=1
FinishAction=[!SetVariable AlertTestLabel "TEST ALERT"][!UpdateMeter MeterTestAlert][!Redraw]

