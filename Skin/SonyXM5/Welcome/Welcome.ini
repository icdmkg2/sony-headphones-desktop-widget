[Rainmeter]
Update=500
AccurateText=1
DynamicWindowSize=1
BackgroundMode=2
SolidColor=0,0,0,1
OnRefreshAction=[!ZPos "2"]
ContextTitle=Close welcome guide
ContextAction=[!CommandMeasure MeasureWelcome "Skip()"]

@Include=#ROOTCONFIGPATH#@Resources\Variables.inc
@Include2=#ROOTCONFIGPATH#@Resources\UserSettings.inc

[Variables]
Panel=20,20,23,252
PanelCard=30,30,34,248
PanelHigh=40,40,44,255
Accent=91,225,145,255
AccentSoft=91,225,145,30
Muted=155,155,155,255
Stroke=76,76,82,180
DarkText=17,31,23,255
WizardStep=1 / 3
Step1Color=91,225,145,255
Step2Color=76,76,82,180
Step3Color=76,76,82,180
WizardLineFill=91,225,145,30
WizardLineStroke=91,225,145,255
WizardLineText=91,225,145,255
WizardLineBadge=SELECTED
WizardStudioFill=30,30,34,248
WizardStudioStroke=76,76,82,180
WizardStudioText=245,245,245,255
WizardStudioBadge=CHOOSE
WizardMonoFill=30,30,34,248
WizardMonoStroke=76,76,82,180
WizardMonoText=245,245,245,255
WizardMonoBadge=CHOOSE
ChosenDesign=LINE

[MeasureWelcome]
Measure=Script
ScriptFile=#ROOTCONFIGPATH#@Resources\Scripts\Welcome.lua
SettingsPath=#ROOTCONFIGPATH#@Resources\UserSettings.inc
UpdateDivider=1

[StyleTitle]
FontFace=#FontDisplay#
FontSize=24
FontColor=#UserTextColor#
AntiAlias=1
StringAlign=LeftCenter
W=720
H=42
DynamicVariables=1

[StyleHint]
FontFace=#Font#
FontSize=10
FontColor=#UserMutedColor#
AntiAlias=1
StringAlign=LeftCenter
W=720
H=24
DynamicVariables=1

[StyleButton]
FontFace=#FontDisplay#
FontSize=10
FontColor=#UserTextColor#
AntiAlias=1
StringAlign=CenterCenter
SolidColor=#PanelHigh#
W=150
H=42
DynamicVariables=1

[StylePrimaryButton]
FontFace=#FontDisplay#
FontSize=10
FontColor=#DarkText#
AntiAlias=1
StringAlign=CenterCenter
SolidColor=#Accent#
W=180
H=42
DynamicVariables=1

[MeterSurface]
Meter=Shape
Shape=Rectangle 0.5,0.5,919,639,24 | Fill Color #Panel# | Stroke Color #UserLineColor# | StrokeWidth 1
DynamicVariables=1

[MeterBrand]
Meter=String
X=34
Y=34
W=420
H=30
FontFace=#FontDisplay#
FontSize=13
FontColor=#UserTextColor#
AntiAlias=1
StringAlign=LeftCenter
Text=SONY HEADPHONES DESKTOP WIDGET
