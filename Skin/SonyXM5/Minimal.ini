[Rainmeter]
Update=200
AccurateText=1
DynamicWindowSize=1
BackgroundMode=2
SolidColor=0,0,0,1
ContextTitle=Customize widget
ContextAction=[!ActivateConfig "SonyXM5\Settings" "Settings.ini"]
ContextTitle2=Reconnect headphones
ContextAction2=[!CommandMeasure MeasureScript "Reconnect()"]
ContextTitle3=Refresh headphone state
ContextAction3=[!CommandMeasure MeasureScript "RefreshBridge()"]
ContextTitle4=Edit connection settings
ContextAction4=["notepad.exe" "#@#Data\settings.ini"]
ContextTitle5=Advanced controls
ContextAction5=[!CommandMeasure MeasureScript "ToggleAdvanced()"]
ContextTitle6=Dock above taskbar
ContextAction6=[!CommandMeasure MeasureScript "DockBottom()"]

@Include=#@#Variables.inc
@Include2=#@#UserSettings.inc
@Include3=#@#AdvancedLine.inc
@Include4=#@#AdvancedStudio.inc
@Include5=#@#MonoSignal.inc

[MeasureScript]
Measure=Script
ScriptFile=#@#Scripts\SonyXM5.lua
DataPath=#@#Data
BridgePath=#@#Bridge\SonyXM5Bridge-0.3.35.bin
ExpectedBridgeVersion=0.3.35
MinValue=0
MaxValue=100
UpdateDivider=1

[MeasureBridgeLauncher]
Measure=Plugin
Plugin=RunCommand
Program=powershell.exe
Parameter=-NoLogo -NoProfile -NonInteractive -WindowStyle Hidden -ExecutionPolicy Bypass -File "#@#Scripts\BridgeLauncher.ps1" -PayloadPath "#@#Bridge\SonyXM5Bridge-0.3.35.bin" -RuntimeDirectory "#@#Data\Runtime" -DataPath "#@#Data"
State=Hide
OutputType=ANSI
DynamicVariables=1

[MeasureBatteryAlert]
Measure=Plugin
Plugin=RunCommand
Program=powershell.exe
Parameter=-NoLogo -NoProfile -NonInteractive -Sta -WindowStyle Hidden -ExecutionPolicy Bypass -File "#@#Scripts\BatteryAlert.ps1" -Battery #BatteryAlertValue# -DeviceName "#AlertDeviceName#" -Kind #AlertKind#
State=Hide
OutputType=ANSI
DynamicVariables=1

[MeterBounds]
Meter=Shape
X=0
Y=0
W=#WidgetWidth#
H=#WidgetHeight#
Shape=Rectangle 0,0,#WidgetWidth#,#WidgetHeight#,0 | Fill Color 255,255,255,255 | StrokeWidth 0
DynamicVariables=1

