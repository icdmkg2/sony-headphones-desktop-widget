[Rainmeter]
Update=500
AccurateText=1
DynamicWindowSize=1
BackgroundMode=2
SolidColor=0,0,0,1
ContextTitle=Copy full debug report
ContextAction=[!CommandMeasure MeasureDebug "CopyAll()"]
ContextTitle2=Refresh debug data
ContextAction2=[!CommandMeasure MeasureDebug "Refresh()"]
ContextTitle3=Close debug
ContextAction3=[!DeactivateConfig "SonyXM5\Debug"]

@Include=#ROOTCONFIGPATH#@Resources\Variables.inc
@Include2=#ROOTCONFIGPATH#@Resources\UserSettings.inc

[Variables]
Panel=24,24,27,250
PanelHigh=39,39,43,245
DebugStatusColor=155,155,155,255
DebugDeviceName=WH-1000XM5
DebugStatusText=READING DEBUG DATA
DebugStatusDetail=
DebugConnectionSummary=Waiting for bridge state
DebugAudioSummary=Waiting for audio state
DebugFeatureSummary=Waiting for feature state
DebugRawLeft=Waiting for state.ini
DebugRawRight=
DebugLog=Waiting for bridge.log
DebugCopyLabel=COPY ALL

[MeasureDebug]
Measure=Script
ScriptFile=#ROOTCONFIGPATH#@Resources\Scripts\Debug.lua
DataPath=#ROOTCONFIGPATH#@Resources\Data
SettingsPath=#ROOTCONFIGPATH#@Resources\Data\settings.ini
LogPath=#ROOTCONFIGPATH#@Resources\Data\bridge.log
UpdateDivider=1

[StyleButton]
FontFace=#FontDisplay#
FontSize=8
FontColor=#UserTextColor#
AntiAlias=1
StringAlign=CenterCenter
SolidColor=#PanelHigh#
W=92
H=28
DynamicVariables=1

[StyleCardHeading]
FontFace=#FontDisplay#
FontSize=9
FontColor=#UserMutedColor#
AntiAlias=1
StringAlign=LeftCenter
W=260
H=20
DynamicVariables=1

[StyleCardText]
FontFace=#Font#
FontSize=8
FontColor=#UserTextColor#
AntiAlias=1
StringAlign=LeftTop
ClipString=1
W=288
H=108
DynamicVariables=1

[StyleRawText]
FontFace=Consolas
FontSize=7
FontColor=#UserTextColor#
AntiAlias=1
StringAlign=LeftTop
ClipString=1
W=486
H=270
DynamicVariables=1

[MeterSurface]
Meter=Shape
Shape=Rectangle 0.5,0.5,1039,759,18 | Fill Color #Panel# | Stroke Color #UserLineColor# | StrokeWidth 1
DynamicVariables=1

[MeterTitle]
Meter=String
X=24
Y=28
W=380
H=26
FontFace=#FontDisplay#
FontSize=15
FontColor=#UserTextColor#
AntiAlias=1
StringAlign=LeftCenter
Text=FULL DEBUG DATA
DynamicVariables=1

[MeterStatusDot]
Meter=Shape
X=26
Y=58
Shape=Ellipse 0,0,3,3 | Fill Color #DebugStatusColor# | StrokeWidth 0
DynamicVariables=1

[MeterDevice]
Meter=String
X=38
Y=57
W=210
H=18
FontFace=#FontDisplay#
FontSize=9
FontColor=#UserTextColor#
AntiAlias=1
StringAlign=LeftCenter
Text=#DebugDeviceName#
DynamicVariables=1

[MeterStatus]
Meter=String
X=250
Y=57
W=390
H=18
FontFace=#Font#
FontSize=8
FontColor=#DebugStatusColor#
AntiAlias=1
StringAlign=LeftCenter
ClipString=1
Text=#DebugStatusText#
DynamicVariables=1

[MeterCopy]
Meter=String
MeterStyle=StyleButton
X=728
Y=28
Text=#DebugCopyLabel#
LeftMouseUpAction=[!CommandMeasure MeasureDebug "CopyAll()"]

[MeterRefresh]
Meter=String
MeterStyle=StyleButton
X=826
Y=28
Text=REFRESH
LeftMouseUpAction=[!CommandMeasure MeasureDebug "Refresh()"]

[MeterClose]
Meter=String
MeterStyle=StyleButton
X=924
Y=28
Text=CLOSE
LeftMouseUpAction=[!CommandMeasure MeasureDebug "Close()"]

[MeterConnectionCard]
Meter=Shape
X=24
Y=91
Shape=Rectangle 0,0,316,145,12 | Fill Color #PanelHigh# | StrokeWidth 0
DynamicVariables=1

[MeterConnectionHeading]
Meter=String
MeterStyle=StyleCardHeading
X=38
Y=103
Text=CONNECTED HEADPHONE

[MeterConnectionText]
Meter=String
MeterStyle=StyleCardText
X=38
Y=126
Text=#DebugConnectionSummary#

[MeterAudioCard]
Meter=Shape
X=362
Y=91
Shape=Rectangle 0,0,316,145,12 | Fill Color #PanelHigh# | StrokeWidth 0
DynamicVariables=1

[MeterAudioHeading]
Meter=String
MeterStyle=StyleCardHeading
X=376
Y=103
Text=AUDIO AND LISTENING

[MeterAudioText]
Meter=String
MeterStyle=StyleCardText
X=376
Y=126
Text=#DebugAudioSummary#

[MeterFeatureCard]
Meter=Shape
X=700
Y=91
Shape=Rectangle 0,0,316,145,12 | Fill Color #PanelHigh# | StrokeWidth 0
DynamicVariables=1

[MeterFeatureHeading]
Meter=String
MeterStyle=StyleCardHeading
X=714
Y=103
Text=HEADPHONE FEATURES

[MeterFeatureText]
Meter=String
MeterStyle=StyleCardText
X=714
Y=126
Text=#DebugFeatureSummary#

[MeterRawHeading]
Meter=String
X=24
Y=262
W=500
H=22
FontFace=#FontDisplay#
FontSize=10
FontColor=#UserMutedColor#
AntiAlias=1
StringAlign=LeftCenter
Text=COMPLETE RAW STATE AND CONFIGURATION
DynamicVariables=1

[MeterRawDivider]
Meter=Shape
X=24
Y=282
Shape=Line 0,0.5,992,0.5 | Stroke Color #UserDividerColor# | StrokeWidth 1
DynamicVariables=1

[MeterRawLeft]
Meter=String
MeterStyle=StyleRawText
X=24
Y=294
Text=#DebugRawLeft#

[MeterRawRight]
Meter=String
MeterStyle=StyleRawText
X=520
Y=294
Text=#DebugRawRight#

[MeterLogHeading]
Meter=String
X=24
Y=580
W=500
H=22
FontFace=#FontDisplay#
FontSize=10
FontColor=#UserMutedColor#
AntiAlias=1
StringAlign=LeftCenter
Text=RECENT BRIDGE LOG - LAST 8 LINES
DynamicVariables=1

[MeterLogDivider]
Meter=Shape
X=24
Y=600
Shape=Line 0,0.5,992,0.5 | Stroke Color #UserDividerColor# | StrokeWidth 1
DynamicVariables=1

[MeterLog]
Meter=String
X=24
Y=612
W=992
H=102
FontFace=Consolas
FontSize=7
FontColor=#UserMutedColor#
AntiAlias=1
StringAlign=LeftTop
ClipString=1
Text=#DebugLog#
DynamicVariables=1

[MeterFooter]
Meter=String
X=24
Y=739
W=992
H=16
FontFace=#Font#
FontSize=7
FontColor=#UserMutedColor#
AntiAlias=1
StringAlign=LeftCenter
Text=Read-only diagnostics. COPY ALL includes the complete values, file paths, and recent log lines.
DynamicVariables=1
